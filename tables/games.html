<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">

<title>Games | AdminLTE</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="../css/adminlte.css">

<link rel="stylesheet" href="../css/styles.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">

<div class="app-wrapper">


<!-- NAVBAR -->

<nav class="app-header navbar navbar-expand bg-body">

<div class="container-fluid">

<ul class="navbar-nav">

<li class="nav-item">

<a class="nav-link" data-lte-toggle="sidebar" href="#">

<i class="bi bi-list"></i>

</a>

</li>

</ul>

</div>

</nav>


<!-- SIDEBAR -->

<aside class="app-sidebar bg-body-secondary shadow">

<div class="sidebar-brand">

<a href="../index.html" class="brand-link">

<span class="brand-text">AdminLTE | Tablas</span>

</a>

</div>

<div class="sidebar-wrapper">

<nav class="mt-2">

<ul class="nav sidebar-menu flex-column">

<li class="nav-item">

<a href="games.html" class="nav-link active">

<i class="nav-icon bi bi-controller"></i>
<p>Tabla de Videojuegos</p>

</a>

</li>

<li class="nav-item">

<a href="genres.html" class="nav-link">

<i class="nav-icon bi bi-tags"></i>
<p>Tabla de géneros de juegos</p>

</a>

</li>

</ul>

</nav>

</div>

</aside>
<!-- MAIN -->
<main class="app-main">
    <div class="app-content-header">
        <div class="container-fluid">
            <h3>Videojuegos</h3>
        </div>
    </div>
    <div class="app-content">
        <div class="container-fluid">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Tabla de juegos</h3>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <button
                            class="btn btn-primary mb-3"
                            onclick="openNewGame()"
                            >
                            Nuevo Juego
                            </button>
                            <table
                            id="gamesTable"
                            class="table table-striped table-bordered">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Desarrollador</th>
                                    <th>Género</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</div>
<!-- MODALES -->

<!-- MODAL EDITAR/AGREGAR -->

<div class="modal fade" id="gameModal" tabindex="-1">
    <div class="modal-dialog">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Información del Juego</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
    <div class="modal-body">
        <form id="gameForm">
            <input type="hidden" id="game_id">
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input
                type="text"
                class="form-control"
                id="name"
                required
                >
            </div>
            <div class="mb-3">
                <label class="form-label">Desarrollador</label>
                <input
                type="text"
                class="form-control"
                id="developer"
                required
                >
            </div>
            <div class="mb-3">
                <label class="form-label">Género</label>
                <select
                id="genre"
                class="form-control"
                required
                ></select>
            </div>
        </form>
    </div>
    <div class="modal-footer">
    <button
    class="btn btn-secondary"
    data-bs-dismiss="modal"
    >
    Cancelar
    </button>
    <button
    class="btn btn-primary"
    onclick="saveGame()"
    >
    Guardar
    </button>
    </div>
    </div>
    </div>
</div>

<!-- MODAL ELIMINAR -->
<div class="modal fade" id="deleteModal" tabindex="-1">

    <div class="modal-dialog">
    
    <div class="modal-content">
    
    <div class="modal-header bg-danger text-white">
    
    <h5 class="modal-title">CONFIRMACIÓN</h5>
    
    <button class="btn-close" data-bs-dismiss="modal"></button>
    
    </div>
    
    <div class="modal-body">
    <p id="deleteMessage"></p>
    </div>
    <div class="modal-footer">
    <button class="btn btn-secondary" data-bs-dismiss="modal">
    CANCELAR
    </button>
    <button class="btn btn-danger" id="confirmDeleteBtn">
    ELIMINAR
    </button>
    </div>
    </div>
    </div>
    </div>
<!-- MODAL CONFIRMACIÓN ELIMINAR -->
<div class="modal fade" id="successModal" tabindex="-1">

    <div class="modal-dialog">
    
    <div class="modal-content">
    
    <div class="modal-header bg-success text-white">
    
    <h5 class="modal-title">REALIZADO CON ÉXITO</h5>
    
    <button class="btn-close" data-bs-dismiss="modal"></button>
    
    </div>
    
    <div class="modal-body">
    
    <p id="successMessage"></p>
    
    </div>
    
    <div class="modal-footer">
    
    <button class="btn btn-success" data-bs-dismiss="modal">
    OK
    </button>
    
    </div>
    
    </div>
    
    </div>
    
    </div>


<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<!-- AdminLTE -->
<script src="../js/adminlte.js"></script>

<script src="../js/games.js"></script>

</body>

</html>
